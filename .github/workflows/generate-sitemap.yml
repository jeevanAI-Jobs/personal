name: Generate Sitemap + Feed

on:
  push:
    branches: [master]
    paths-ignore:
      - sitemap.xml   # avoid loop: action only commits these files
      - feed.xml

jobs:
  sitemap-and-feed:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate sitemap.xml
        run: node scripts/generate-sitemap.js

      - name: Generate feed.xml
        run: node scripts/generate-feed.js

      - name: Commit if changed
        run: |
          git config user.email "saranshraj.srivastava@gmail.com"
          git config user.name "Jeevan AI Bot"
          git add sitemap.xml feed.xml
          git diff --cached --quiet && echo "no changes, skipping commit" || \
            (git commit -m "chore: regenerate sitemap + feed [skip ci]" && git push)
